<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Wise - Movie Recommender</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="phone-container" id="phone-container">
        <div id="start-view" class="view center-content active">
            <span class="logo-img">🍿</span>
            <h1 class="logo-text">MovieWise</h1>

            <div class="form-group">
                <input type="number" id="input-people" placeholder="How many people?" min="1">
            </div>
            <div class="form-group">
                <input type="text" id="input-time" placeholder="How much time do you have?">
            </div>

            <button class="primary-btn" id="start_btn">Start</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
